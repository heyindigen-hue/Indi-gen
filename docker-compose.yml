version: '3.9'

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: indigen
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    networks:
      - indigen

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    networks:
      - indigen

  server:
    build:
      context: ./server
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/indigen
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis
    networks:
      - indigen
    expose:
      - '3001'

  scraper:
    build:
      context: ./scraper-service
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis
    networks:
      - indigen
    expose:
      - '8000'

  admin:
    build:
      context: ./admin
    restart: unless-stopped
    networks:
      - indigen
    expose:
      - '80'

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - '80:80'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - server
      - scraper
      - admin
    networks:
      - indigen

volumes:
  postgres_data:

networks:
  indigen:
    driver: bridge
