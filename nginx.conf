events {
    worker_connections 1024;
}

http {
    upstream server_upstream {
        server server:3001;
    }

    upstream admin_upstream {
        server admin:80;
    }

    upstream customer_upstream {
        server customer:80;
    }

    upstream scraper_upstream {
        server scraper:8000;
    }

    server {
        listen 80;

        location /api/ {
            proxy_pass http://server_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /webhook/ {
            proxy_pass http://server_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /scrape-svc/ {
            proxy_pass http://scraper_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /admin/ {
            proxy_pass http://admin_upstream/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location / {
            proxy_pass http://customer_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
