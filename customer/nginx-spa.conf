server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Customer SPA mounted at /customer/
  location /customer/ {
    alias /usr/share/nginx/html/;
    try_files $uri $uri/ /index.html;
  }

  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Bare visits redirect to the customer base path
  location = / {
    return 302 /customer/;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
