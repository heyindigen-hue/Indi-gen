<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200" fill="none">
  <!-- Background circle -->
  <circle cx="120" cy="110" r="72" fill="#f3eeff" opacity="0.6"/>

  <!-- Magnifying glass body -->
  <circle cx="104" cy="96" r="36" fill="#fff" stroke="#552f83" stroke-width="5"/>
  <circle cx="104" cy="96" r="28" fill="#f8f4ff"/>

  <!-- Question mark inside glass -->
  <text x="96" y="108" font-family="Georgia, serif" font-size="28" font-weight="bold" fill="#552f83">?</text>

  <!-- Handle -->
  <line x1="130" y1="122" x2="152" y2="144" stroke="#552f83" stroke-width="6" stroke-linecap="round"/>

  <!-- Petals around the magnifying glass -->
  <!-- Petal 1 - top -->
  <ellipse cx="104" cy="42" rx="8" ry="14" fill="#7c4db8" opacity="0.7"/>
  <!-- Petal 2 - top-right -->
  <ellipse cx="104" cy="42" rx="8" ry="14" fill="#552f83" opacity="0.6" transform="rotate(45 104 96)"/>
  <!-- Petal 3 - right -->
  <ellipse cx="104" cy="42" rx="8" ry="14" fill="#7c4db8" opacity="0.7" transform="rotate(90 104 96)"/>
  <!-- Petal 4 - bottom-right -->
  <ellipse cx="104" cy="42" rx="8" ry="14" fill="#552f83" opacity="0.5" transform="rotate(135 104 96)"/>
  <!-- Petal 5 - bottom -->
  <ellipse cx="104" cy="42" rx="8" ry="14" fill="#7c4db8" opacity="0.6" transform="rotate(180 104 96)"/>
  <!-- Petal 6 - bottom-left -->
  <ellipse cx="104" cy="42" rx="8" ry="14" fill="#552f83" opacity="0.5" transform="rotate(225 104 96)"/>
  <!-- Petal 7 - left -->
  <ellipse cx="104" cy="42" rx="8" ry="14" fill="#7c4db8" opacity="0.7" transform="rotate(270 104 96)"/>
  <!-- Petal 8 - top-left -->
  <ellipse cx="104" cy="42" rx="8" ry="14" fill="#552f83" opacity="0.6" transform="rotate(315 104 96)"/>

  <!-- Small accent dot -->
  <circle cx="104" cy="96" r="5" fill="#f97316"/>

  <!-- Caption area -->
  <rect x="60" y="160" width="120" height="22" rx="11" fill="#f3eeff"/>
  <text x="120" y="176" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#552f83" font-weight="600">No leads yet</text>
</svg>
