<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200" fill="none">
  <!-- Background glow -->
  <circle cx="120" cy="95" r="72" fill="#f3eeff" opacity="0.5"/>

  <!-- Full bloomed flower -->
  <!-- Outer petals - fully open, vibrant -->
  <ellipse cx="120" cy="40" rx="12" ry="24" fill="#552f83"/>
  <ellipse cx="120" cy="40" rx="12" ry="24" fill="#552f83" transform="rotate(45 120 95)"/>
  <ellipse cx="120" cy="40" rx="12" ry="24" fill="#552f83" transform="rotate(90 120 95)"/>
  <ellipse cx="120" cy="40" rx="12" ry="24" fill="#552f83" transform="rotate(135 120 95)"/>
  <ellipse cx="120" cy="40" rx="12" ry="24" fill="#7c4db8" opacity="0.8" transform="rotate(22.5 120 95)"/>
  <ellipse cx="120" cy="40" rx="12" ry="24" fill="#7c4db8" opacity="0.8" transform="rotate(67.5 120 95)"/>
  <ellipse cx="120" cy="40" rx="12" ry="24" fill="#7c4db8" opacity="0.8" transform="rotate(112.5 120 95)"/>
  <ellipse cx="120" cy="40" rx="12" ry="24" fill="#7c4db8" opacity="0.8" transform="rotate(157.5 120 95)"/>

  <!-- Centre -->
  <circle cx="120" cy="95" r="18" fill="#f97316"/>
  <circle cx="120" cy="95" r="12" fill="#fff3e0"/>

  <!-- Checkmark in centre -->
  <path d="M112 95 l5 5 9-9" stroke="#f97316" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Sparkles around flower -->
  <!-- Sparkle 1 -->
  <line x1="64" y1="48" x2="64" y2="40" stroke="#f97316" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="60" y1="44" x2="68" y2="44" stroke="#f97316" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Sparkle 2 -->
  <line x1="178" y1="52" x2="178" y2="44" stroke="#552f83" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="174" y1="48" x2="182" y2="48" stroke="#552f83" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Sparkle 3 -->
  <line x1="56" y1="110" x2="56" y2="104" stroke="#7c4db8" stroke-width="2" stroke-linecap="round"/>
  <line x1="53" y1="107" x2="59" y2="107" stroke="#7c4db8" stroke-width="2" stroke-linecap="round"/>
  <!-- Sparkle 4 -->
  <line x1="186" y1="115" x2="186" y2="109" stroke="#f97316" stroke-width="2" stroke-linecap="round"/>
  <line x1="183" y1="112" x2="189" y2="112" stroke="#f97316" stroke-width="2" stroke-linecap="round"/>
  <!-- Sparkle 5 small -->
  <circle cx="76" cy="136" r="3" fill="#f97316" opacity="0.7"/>
  <circle cx="165" cy="70" r="2.5" fill="#552f83" opacity="0.6"/>
  <circle cx="170" cy="132" r="2" fill="#7c4db8" opacity="0.6"/>

  <!-- Caption -->
  <rect x="74" y="155" width="92" height="22" rx="11" fill="#f3fff6"/>
  <text x="120" y="171" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#16a34a" font-weight="600">Done! Great work.</text>
</svg>
